kind = "web"
previewPath = "/"
title = "CardMaker"
version = "1.0.0"
id = "artifacts/cardmaker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19829

[services.development]
run = "pnpm --filter @workspace/cardmaker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cardmaker", "run", "build" ]
publicDir = "artifacts/cardmaker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19829"
BASE_PATH = "/"
